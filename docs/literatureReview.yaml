- type: paragraph
  heading: Boat Anatomy - Directions & Regions
  description:
  - Boats are divided into 4 directions, all of which are relative to the helm. The fore or forward is the direction moving towards the front of the ship. The aft is the direction moving towards the back. Outboard refers to moving away from the center line of the boat. Inboard refers to moving towards the centerline of the boat.
  - 'The regions of the boat are also divided into 4 categories. There are more, but these are the big ones: bow is the front of the ship, stern is the rear of the ship, starboard is the right side of the ship, and port is the left side of the ship. This can be remembered because both left and port have 4 letters.'

- type: paragraph
  heading: Boat Anatomy - Parts
  description:
  - 'On a sailing ship there are many parts that matter, but we will only mention the most relevant ones. The hull is the actual body of the boat. The keel is the large plate below the hull that is fully submerged in the water. The rudder is a small plate in the back of the ship used for steering. The mast is the vertical structure mounted on the hull to which sails are attached. '

- type: paragraph
  heading: Boat Anatomy - Self-Trimming Wingsail
  description:
  - For our autonomous sailboat we chose to use a self-trimming wingsail. The wing sail or main sail is the largest part and provides the majority of the force used to move the boat on the water. The smaller sail behind it is called the tail or wind vein and is used to control the main sail's angle. In addition to these two main parts the self-trimming wingsail has a counter weight for the tail and a pivot around which it rotates.

- type: paragraph
  heading: Boat Anatomy - Trimaran
  description:
  - 'Additionally, we will be making a Trimaran-style sailing vessel. Trimarans are composed of 3 parts: a main body and 2 balancing bodies that are attached to the sides using long rods or arms. The main body is called a vaka and the balancing bodies are called amas.'

- type: paragraph
  heading: Boat Anatomy - Freeboard & Draft
  description:
  - Finally there are special terms used to refer to boats when they are in the water. Freeboard is the portion of the hull that is out of the water. Draft is the portion of the hull that is in the water.

- type: subsection
  section: Physics of Sailing
  subsections:
  - Lift Forces
  - Point of Sail
  - Rudder Control
  - COE & CLR

- type: paragraph
  heading: Physics of Sailing - Lift Forces
  description:
  - Sail boats are built around 2 opposing forces, the lift force on the sail and the lift force on the keel. The wind blows at the boat and this creates a lift force perpendicular to the sail. This lifting force generally goes in a direction that is not directly forward, rather it is towards the port or starboard sides. This would cause the boat to move mostly sideways and a little forwards but the keel creates a second lifting force that points in the outboard direction opposite of the sail's lifting force. This cancels out the sideways lifting force of the sail and pushes the boat forward.

- type: paragraph
  heading: Physics of Sailing - Point of Sail
  description:
  - "Because of this 2 force system, the angle of the boat relative to the wind (called point of sail) and the angle of the sail relative to the wind (called angle of attack) both matter immensely. To maximise the forward component of the lift force the angle of attack depends on the point of sail as shown in the diagram below. When sailing the point of sail can be any angle except between -45\xB0 and +45\xB0 relative to the wind. This 90\xB0 range is referred to as being in irons or simply the no sail zone, this is because the angle of attack cannot result in sufficient forward facing lift to move the boat in that direction."

- type: paragraph
  heading: Physics of Sailing - Rudder Control
  description:
  - The second control structure on the boat is the rudder. The rudder is attached to the back of the boat and provides a second wing to change the way the keel force interacts with the boat. If you turn the rudder such that it points towards the wind this will decrease the keel force causing the ship to turn out of the wind. If you turn the rudder such that it points away from the wind this will increase the keel force so that the ship turns into the wind.

- type: paragraph
  heading: Physics of Sailing - COE & CLR
  description:
  - The point at which the lifting force of the sail occurs is called the center of effort, COE for short, and the point at which the lifting force of the keel occurs is called the center of lateral resistance or CLR. Designing the boat and sail rigging such that the COE is just aft of the CLR creates a slight weather helm. A weather helm means the boat wants to turn into the wind, which helps the boat remain stable under most conditions.

- type: subsection
  section: Boat Design
  subsections:
  - Hull Types
  - Keel Types & Sub-forms
  - Rudder Balance & Styles
  - Sail Materials
  - Wingsail Types

- type: paragraph
  heading: Boat Design - Hull Types
  description:
  - There are 2 primary hull designs, displacement and plaining. Displacement hulls are larger and rounder, they function by displacing a large amount of water to create the buoyancy force necessary to keep the ship afloat, because of this they are slower but more stable. Plaining hulls are generally flat and shallow, they function by allowing the boat to glide across the surface of the water, because of this they are faster but less stable.

- type: paragraph
  heading: Boat Design - Keel Types & Sub-forms
  description:
  - Keels come in 2 major forms as well, fin and full keels. Full keels extend across the whole length of the hull and provide more stability and a much shallower draft but they have higher drag. Fin keels have a thin plate extending deep into the water, they are much more efficient then full keels but also have a much deeper draft.
  - Keels can come in several sub-forms differentiated by their lowest point. The most common styles are squared off, rounded off, or bulb. Squared off is exactly what it sounds like, the bottom of the keel is squared off, this increases drag so usually boats go with the rounded off style instead. The other type is bulb, this involves having a large bulb shape at the bottom of the keel, this can increase stability and help move the center of mass down.

- type: paragraph
  heading: Boat Design - Rudder Balance & Styles
  description:
  - Rudders come in many forms defined by their balance. A fully balanced rudder is designed with a pivot that spins about its center of drag, this means it is very easy to turn but will not return to its home position if left alone. A fully unbalanced rudder is designed with a pivot as far forward on the rudder as possible, this means it is very difficult to turn but will immediately return to its home position if left alone.
  - Additionally rudders can be either spade or skeg style. Spade rudders are free floating and only attached via the control rod, they are simpler to make but are more prone to damage. Skeg rudders are attached to the hull using a skeg, a fin-like structure that bolts onto the hull and wraps around the rudder's top and bottom pivot points.

- type: paragraph
  heading: Boat Design - Sail Materials
  description:
  - Sails can be made from rigid material or cloth. Cloth sails are more traditional and much cheaper so they are generally used for private vessels, but they are also more prone to wear and tear. Rigid sails are made from plastic or metal and are much more durable, they are also more efficient at creating the lifting force. Because autonomous sail boats are smaller and more prone to damages, rigid sails are generally used over cloth ones.

- type: paragraph
  heading: Boat Design - Wingsail Types
  description:
  - First is the traditional wingsails, which include one rigid sail with a motor attached to the mast to rotate the entire mainsail. Because of this, the control complexity is low, but it requires a powerful motor due to the amount of force required to rotate and hold the entire mainsail at the optimal angle of attack towards the wind. As a result of the powerful motor required, the energy consumption is also high.
  - The second control system is the flap wingsail. This includes one rigid mainsail and a rigid flap attached aft of it. A motor is used to rotate the flap to the optimal angle of attack. The force from the wind on the flap in turn rotates the main sail. Due to the motor not directly rotating the main sail, the control complexity is higher than that of the traditional wingsail. However, this also makes the power consumption less than that of the traditional wingsail.
  - Finally, there is the self-trimming wingsail. The self-trimming wingsail utilizes a tail suspended aft the main sail by a long rod. The tail is roughly a third of the size of the main sail. The control system works by rotating the tail using a motor, the torque provided by the tail then rotates the mainsail with minimal effort. Due to the minimal amount of force required to rotate the tail, it consumes much less power than the other two control systems. However, because we can only rotate the main sail using torque from the tail, the control complexity is much higher. This is due to delayed sail rotation time, wind speed drastically affecting main sail rotation, and the indirect nature of the control.

