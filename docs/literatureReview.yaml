- type: cost_analysis
  columns:
  - title: Total Costs
    body: "It's pretty hard to predict the exact cost of our project now, as it is we know the price of most components, but could still end up with a huge cost swing from development. As a rough estimate, we expect the total to be around $1000: $400 for hull materials, $200 for keel and rudder materials, $200 for electrical components, and $200 in unexpected costs."
  - title: Major Expenses
    body: The most expensive single item is resin. The resin used to make the hull will cost over $100 on its own. The most expensive single component is also the hull. The mold for the hull will cost over $100 to print plus over $100 for 3D print filament on top of the cost of fiberglass and resin. The next most expensive part is the keel, this is because the majority of the keel has to be made from 316 steel.
  - title: Financing
    body: Many of these parts can be sponsored by on-campus groups, such as 3D print filament. We plan to contact various off-campus groups as well for less available goods, such as fiber glass and carbon fiber. Some reusable equipment will be purchased and loaned to us by staff at the university, such as breathing masks and other PPE. However, this will still leave us with significant amounts of equipment, parts, and materials that we will need to purchase. For any items that we need to purchase ourselves we will open a shared bank account and use a shared debit card. One of the team members says he has a coupon for a new member bonus cash at Chase Bank, so we might use that as well.
