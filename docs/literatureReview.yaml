- type: subsection
  section: Mechanical
  subsections:
  - Chosen Design
  - Hull Build
  - Keel Build
  - Rudder Build
  - Sail Build

- type: paragraph
  heading: Mechanical - Chosen Design
  description:
  - We will build a trimaran sailboat with a draft hull, a self-trimming wingsail, a fin keel with a bulb, and a spade rudder.  We chose to build a trimaran with a draft hull because of the greater stability. The draft hull is naturally more stable and the amas of a trimaran provides a rebalancing buoyancy force when turning but remains out of the water when going straight, reducing overall drag while increasing stability. We chose a self-trimming wingsail because of its high efficiency. We chose a fin keel because of its manufacturability, we can manufacture the hull and keel separately then attach them later. We chose the bulb design because of the additional control it gives us over the weight and center of mass. We chose a spade rudder purely for its simplicity, the design makes it very easy to modify and fix if something goes wrong.

- type: paragraph
  heading: Mechanical - Hull Build
  description:
  - The hull will be made using fiber glass sheets. We will do a wet lay of fiberglass and resin in a female mold. The mold will be created from 2 parts, a stern and bow portion that can be bolted together. The hull will be made from 7 sheets, this corresponds to about 1 mm of thickness once dry. The mounting point for the keel will be layered with extra sheets and a metal plate will be placed inside the mounting nipple and then covered in resin to further reinforce the keel mount. The rear face of the stern will also be layered with extra fiberglass for improved strength but the internal metal plate used for mounting will not be permanently attached via resin.

- type: paragraph
  heading: Mechanical - Keel Build
  description:
  - The keel will be made of 3 portions, the frame, body, and weights. The frame will be welded together from 316 steel using a plate, square post and tube. 316 steel was chosen because of its high resistance to corrosion. The body of the keel will be made from 2 mirrored fins that clamp around the square post to give us the necessary amount of keel lift and the lift in the correct spot relative to the boat. The weight of the keel will be placed in the bulb, this portion of the frame is made from a hollow tube that can be filled with any cheap weight material, such as steel bird shot.

- type: paragraph
  heading: Mechanical - Rudder Build
  description:
  - The rudder will be made from 2 portions, the rudder itself and a clamping mechanism for holding it in place. The rudder will be just a rod with a plate welded onto the end, all of it made from 316 steel. The clamp will consist of a fore and aft section. The fore section will be placed against the rear most wall of the boat's stern and the aft section will be placed over that. The clamping mechanism will be designed with spaces for the servo, bearings, rudder shaft, and shaft collars.

- type: paragraph
  heading: Mechanical - Sail Build
  description:
  - The main sail will be made from a carved piece of foam covered in fiber glass. This will allow us to manufacture the over 1 meter sail while keeping its weight low. This same process will be mirrored for the tail. Furthermore, the sail will be mounted on a hollow carbon fiber rod that acts as the mast. The rod will be free to spin on a bearing, and power to the servo will be fed through the rod. This means that the servo will sit in a designated slot inside the rigid sail, keeping it safe from the water. The servo will hook onto a metal wire that will pull or push the tail around its axis of rotation. Lastly, the carbon fiber rods connecting the tail to the main sail will extend outwards in the direction opposite of the tail, adding counterweight to balance the sail setup.

- type: subsection
  section: Electrical
  subsections:
  - Servos & Power
  - Sensors
  - Communications

- type: paragraph
  heading: Electrical - Servos & Power
  description:
  - For this boat to function mechanically, we will need at least 2 servos and a power distribution board. One servo will control the sail and one will control the rudder. The power distribution board will be used to connect our battery to all of our electronics. It will need to provide stepped-down voltages for every component so as not to fry them.

- type: paragraph
  heading: Electrical - Sensors
  description:
  - For the boat to function autonomously it will need many sensors including an IMU, magnetometer, wind sensor, GPS, and a power monitor. The GPS will be used for onboard navigation between waypoints set by an operator. The magnetometer and IMU will be used for spatial orientation to ensure correct navigation. The wind sensor will be used to control the orientation of the sail to maximize the boat's motion. The power monitor will monitor the state of the battery. For our project, this sensor is mostly for show but in a real-world scenario, it would be necessary to keep the boat from going fully dead.

- type: paragraph
  heading: Electrical - Communications
  description:
  - 'For the boat to communicate with the operator, it will need an RF antenna. Because we expect line-of-sight communication with an elevated ground station and we want to emphasize low power operation, we have decided to implement LoRa wireless protocol. LoRa, as opposed to other potential protocols like WiFi or Bluetooth, is simple in that it operates with a much lower bandwidth and at much slower speeds. Our use case involves two situations. Sending serial byte data from the onboard STM32 to view servo position, sensor readings, battery status, gps position, etc. Sending serial byte data from the ground station to control the boat manually or update the route planning.'
  - These processes are low bandwidth and will not exceed the maximum packet speed and packet size that LoRa allows us. The protocol operates in the unlicensed ISM bands, most commonly 915 MHz in North America and 868 MHz in Europe. At these sub-GHz frequencies, the signal achieves significantly greater range than 2.4 GHz protocols like WiFi or Bluetooth. This is because lower frequencies experience less free-space path loss and diffract more readily around obstacles.

- type: subsection
  section: Software
  subsections: []

- type: paragraph
  heading: Software
  description:
  - The boat will be controlled by an STM32H755ZIT6 Dev Board. This board will run on a real-time operating system (RTOS) that pulls data from the sensors and input from the operator to adjust the ship's heading and route as it travels. It will require GPS navigation packages, STM32 HAL drivers, and the FreeRTOS system in addition to all standard C capabilities to function.

